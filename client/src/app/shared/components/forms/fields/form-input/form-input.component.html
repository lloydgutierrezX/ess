<div class="relative">

    <input
        #inputElement
        class="input input-bordered w-full bg-base-200"
        [formControl]="formControl"
        [type]="type"
        [placeholder]="placeholder"
        [readOnly]="readonly"
        [disabled]="disabled"
        [value]="value"
    />

    @if (icon) {
        <span class="absolute right-2 top-1/2 -translate-y-1/2">
            <app-icon [name]="icon" class="input-icon" (click)="onClick()" />
        </span>
    }
</div>
