
<div class="flex gap-1 w-full"
    [class.flex-col]="orientation === 'vertical'"
    [class.flex-row]="orientation === 'horizontal'">

    @for (option of options; track $index) {
        <div class="flex flex-row gap-2 items-center">
            <input class="radio radio-sm"
                type="radio"
                [formControl]="formControl"
                [value]="option.value"
                [name]="config.name"
                [attr.disabled]="disabledAll || option.disabled ? true : null"
                [class]="option.style ?? ''"
            />
            <label class="cursor-pointer select-none" [for]="option.value">{{ option.label }}</label>
        </div>
    }
</div>
